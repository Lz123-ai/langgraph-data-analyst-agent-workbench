services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-127.0.0.1,localhost}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-120}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-20971520}
      MAX_DATASET_ROWS: ${MAX_DATASET_ROWS:-250000}
      MAX_DATASET_COLUMNS: ${MAX_DATASET_COLUMNS:-200}
      MAX_RESULT_ROWS: ${MAX_RESULT_ROWS:-200}
      MAX_CONCURRENT_TASKS: ${MAX_CONCURRENT_TASKS:-2}
      TASK_TIMEOUT_SECONDS: ${TASK_TIMEOUT_SECONDS:-120}
      EVENT_RETENTION_DAYS: ${EVENT_RETENTION_DAYS:-7}
      DATASET_RETENTION_DAYS: ${DATASET_RETENTION_DAYS:-0}
      TRACE_INCLUDE_SAMPLE_DATA: ${TRACE_INCLUDE_SAMPLE_DATA:-false}
      API_ACCESS_TOKEN: ${API_ACCESS_TOKEN:-}
      AUTH_MODE: ${AUTH_MODE:-local}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-}
      OIDC_TENANT_CLAIM: ${OIDC_TENANT_CLAIM:-tenant_id}
      OIDC_ALGORITHMS: ${OIDC_ALGORITHMS:-RS256}
      CORS_ORIGINS: http://127.0.0.1:8080,http://localhost:8080
      USE_LLM: ${USE_LLM:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1-mini}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      PROMPT_VERSION: ${PROMPT_VERSION:-rule-first-v1}
      DEFAULT_TOKEN_BUDGET: ${DEFAULT_TOKEN_BUDGET:-50000}
      INPUT_TOKEN_PRICE_PER_1K: ${INPUT_TOKEN_PRICE_PER_1K:-0.00015}
      OUTPUT_TOKEN_PRICE_PER_1K: ${OUTPUT_TOKEN_PRICE_PER_1K:-0.0006}
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  backend_data:

name: Bug report
description: Report a reproducible Agent, runtime, or UI failure
body:
  - type: textarea
    attributes:
      label: Reproduction
      description: Include the dataset schema, question, expected result, and actual result. Do not attach sensitive data.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Evidence
      description: Include relevant result rows, trace node, and rule-only/LLM mode.
    validations:
      required: true
